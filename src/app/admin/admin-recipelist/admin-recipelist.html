<div class="container-fluid">
  <div class="row">
    <div class="col-sm-12 col-md-3 p-0" style="min-height: 100vh;">
      <app-admin-sidebar />
    </div>
    <div class="col-sm-12 col-md-9">
      <div class="d-flex justify-content-between align-items-center mt-2">
        <h3 class="display-5 fw-bold">Recipes</h3>
        <input type="search" name="search" [(ngModel)]="searchKey" placeholder="Enter name to search" class="form-control w-50 h-50" />
      </div>
      <a routerLink="/admin/add-recipe" class="btn btn-primary my-2">Add New Recipe +</a>
      <!-- Table -->
      @if (recipeList.length > 0) {
        <table class="table table-bordered">
          <thead>
            <tr>
              <th>#</th>
              <th>Name</th>
              <th>Cuisine</th>
              <th>Image</th>
              <th></th>
            </tr>
          </thead>

          <tbody>
            @for (recipe of recipeList|search:searchKey ; track $index) {
              <tr>
                <td>{{$index+1}}</td>
                <td>{{recipe.name}}</td>
                <td>{{recipe.cuisine}}</td>
                <td>
                  <img
                    [src]="recipe?.image"
                    alt="recipeImg"
                    height="100px"
                  />
                </td>
                <td>
                  <a routerLink="/admin/edit-recipe/{{recipe?._id}}" class="btn" ><i class="fa-solid fa-pen-to-square text-warning"></i></a>
                  <button class="btn" (click)="handleDeleteRecipe(recipe?._id)"><i class="fa-solid fa-trash text-danger"></i></button>
                </td>
              </tr>
            }
          </tbody>
        </table>
      }
    </div>
  </div>
</div>
