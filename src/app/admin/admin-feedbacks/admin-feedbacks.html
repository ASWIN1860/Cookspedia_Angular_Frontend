<div class="container-fluid">
  <div class="row">
    <div class="col-sm-12 col-md-3 p-0" style="min-height: 100vh">
      <app-admin-sidebar />
    </div>
    <div class="col-sm-12 col-md-9">
      <h3 class="display-5 mt-2 fw-bold">Feedbacks</h3>
      <!-- Table -->
      @if (feedbackList.length > 0) {
        <table class="table table-bordered">
          <thead>
            <tr>
              <th>#</th>
              <th>Username</th>
              <th>Email</th>
              <th>Feedback</th>
              <th></th>
            </tr>
          </thead>
          <tbody>
            @for (fb of feedbackList; track $index) {
              <tr>
                <td>{{$index+1}}</td>
                <td>{{fb.name}}</td>
                <td>{{fb.email}}</td>
                <td>{{fb.feedback}}</td>
                <td>
                  <button (click)="deleteFeedback(fb._id)" class="btn"><i class="fa-solid fa-trash text-danger"></i></button>
                </td>
              </tr>
            }
          </tbody>
        </table>
      }
    </div>
  </div>
</div>
